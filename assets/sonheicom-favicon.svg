<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="crystal" cx="36%" cy="32%" r="65%">
      <stop offset="0%" stop-color="#f3e8ff"/>
      <stop offset="45%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#3b0764"/>
    </radialGradient>
    <linearGradient id="base" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4c1d95"/>
      <stop offset="50%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </linearGradient>
  </defs>

  <!-- fundo arredondado -->
  <rect width="64" height="64" rx="14" fill="#0e0820"/>

  <!-- bola de cristal -->
  <circle cx="32" cy="28" r="20" fill="url(#crystal)"/>

  <!-- reflexo principal -->
  <ellipse cx="23" cy="19" rx="7" ry="4" fill="white" opacity="0.28" transform="rotate(-25,23,19)"/>

  <!-- ponto de luz -->
  <circle cx="25" cy="19" r="2.5" fill="white" opacity="0.45"/>

  <!-- base larga -->
  <rect x="14" y="47" width="36" height="8" rx="4" fill="url(#base)"/>

  <!-- base estreita -->
  <rect x="19" y="55" width="26" height="5" rx="2.5" fill="#2e1065"/>
</svg>
